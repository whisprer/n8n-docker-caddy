services:
  n8n:
    image: n8nio/n8n:1.60.0         # pin a stable tag
    restart: unless-stopped
    environment:
      - N8N_HOST=n8n.blairboulevard.online
      - N8N_PROTOCOL=https
      - N8N_PORT=5678
      - WEBHOOK_URL=https://n8n.blairboulevard.online/
      - TZ=Asia/Singapore
      - N8N_ENCRYPTION_KEY=5de662302d94f4086ba7fdda7f3570bd
      - NODE_ENV=production
    volumes:
      - ./n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"                  # keep until we confirm healthz; remove later behind Caddy
      - n8n_data:
          - n8n_data:/home/node/.n8n
